<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a73e8">
<title>花東單車計畫 — 旅遊管理系統</title>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>
<style>
:root {
  --primary: #1a73e8;
  --primary-light: #e8f0fe;
  --danger: #d93025;
  --danger-bg: #fce8e6;
  --warning: #e37400;
  --warning-bg: #fef7e0;
  --success: #188038;
  --success-bg: #e6f4ea;
  --info: #1967d2;
  --info-bg: #e8f0fe;
  --purple: #5a3fa0;
  --purple-bg: #e8e0f5;
  --gray: #5f6368;
  --gray-bg: #f1f3f4;
  --bg: #f8f9fa;
  --card: #ffffff;
  --border: #dadce0;
  --text: #202124;
  --text-sec: #5f6368;
  --radius: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,.12), 0 1px 2px rgba(0,0,0,.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
.app {
  max-width: 820px;
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
/* Header */
.header {
  background: var(--primary);
  color: #fff;
  padding: 12px 16px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 { font-size: 16px; font-weight: 600; }
.header .subtitle { font-size: 11px; opacity: .85; margin-top: 2px; }
/* Tab Bar */
.tab-bar {
  display: flex;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  position: sticky;
  top: 52px;
  z-index: 99;
}
.tab-bar::-webkit-scrollbar { display: none; }
.tab-btn {
  flex: 0 0 auto;
  padding: 10px 14px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-sec);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  white-space: nowrap;
  transition: all .2s;
}
.tab-btn.active {
  color: var(--primary);
  border-bottom-color: var(--primary);
}
/* Content */
.content { flex: 1; padding: 12px; }
.page { display: none; }
.page.active { display: block; }
/* Cards */
.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 12px;
  overflow: hidden;
}
.card-header {
  padding: 12px 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  user-select: none;
  -webkit-user-select: none;
}
.card-header:active { background: var(--gray-bg); }
.card-header .title { font-weight: 600; font-size: 14px; flex: 1; }
.card-header .meta { font-size: 11px; color: var(--text-sec); margin-left: 8px; }
.card-header .arrow {
  transition: transform .2s;
  font-size: 12px;
  color: var(--text-sec);
  margin-left: 8px;
}
.card.open .card-header .arrow { transform: rotate(180deg); }
.card-body { display: none; padding: 0 16px 16px; }
.card.open .card-body { display: block; }
/* Schedule Table */
.schedule-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.schedule-table th {
  background: var(--gray-bg);
  padding: 6px 8px;
  text-align: left;
  font-weight: 600;
  border-bottom: 1px solid var(--border);
}
.schedule-table td {
  padding: 6px 8px;
  border-bottom: 1px solid #f0f0f0;
  vertical-align: top;
}
.schedule-table tr:last-child td { border-bottom: none; }
.accommodation {
  margin-top: 12px;
  padding: 10px 12px;
  background: var(--success-bg);
  border-radius: 8px;
  font-size: 12px;
}
.accommodation strong { color: var(--success); }
/* POI Button */
.poi-btn {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  padding: 2px 6px;
  background: var(--primary-light);
  color: var(--primary);
  border-radius: 4px;
  font-size: 11px;
  text-decoration: none;
  cursor: pointer;
  border: none;
}
.poi-btn:active { opacity: .7; }
/* POI Grid */
.poi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 10px;
}
.poi-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  cursor: pointer;
  transition: box-shadow .2s;
}
.poi-card:active { box-shadow: var(--shadow); }
.poi-card .poi-name { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
.poi-card .poi-info { font-size: 11px; color: var(--text-sec); }
.poi-card .poi-phone {
  display: inline-block;
  margin-top: 6px;
  padding: 3px 8px;
  background: var(--success-bg);
  color: var(--success);
  border-radius: 6px;
  font-size: 11px;
  text-decoration: none;
}
/* Category Headers */
.cat-header {
  font-size: 15px;
  font-weight: 700;
  margin: 16px 0 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.cat-header:first-child { margin-top: 0; }
/* Contact List */
.contact-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  border-bottom: 1px solid #f0f0f0;
}
.contact-item:last-child { border-bottom: none; }
.contact-item.warning { background: var(--warning-bg); }
.contact-info { flex: 1; }
.contact-name { font-weight: 600; font-size: 13px; }
.contact-role { font-size: 11px; color: var(--text-sec); }
.contact-note { font-size: 11px; color: var(--warning); margin-top: 2px; }
.phone-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 6px 12px;
  background: var(--success);
  color: #fff;
  border-radius: 20px;
  font-size: 12px;
  text-decoration: none;
  white-space: nowrap;
}
.phone-btn:active { opacity: .8; }
/* Emergency Numbers */
.emergency-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 8px;
  margin-bottom: 16px;
}
.emer-card {
  text-align: center;
  padding: 14px;
  border-radius: 10px;
  background: var(--danger-bg);
}
.emer-card .num { font-size: 22px; font-weight: 700; color: var(--danger); }
.emer-card .label { font-size: 11px; color: var(--text-sec); margin-top: 2px; }
/* Student Contacts Table */
.student-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.student-table th {
  background: var(--gray-bg);
  padding: 8px;
  text-align: left;
  font-weight: 600;
  position: sticky;
  top: 104px;
}
.student-table td { padding: 8px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
.student-table tr.warning td { background: var(--warning-bg); }
/* Dietary */
.allergy-card {
  border-left: 4px solid;
  padding: 12px 16px;
  margin-bottom: 10px;
  border-radius: 0 var(--radius) var(--radius) 0;
  background: var(--card);
  box-shadow: var(--shadow);
}
.allergy-card.danger { border-color: var(--danger); }
.allergy-card.warning { border-color: var(--warning); }
.allergy-card.info { border-color: var(--info); }
.allergy-card .a-name { font-weight: 700; font-size: 14px; }
.allergy-card .a-condition { font-size: 12px; color: var(--text-sec); }
.allergy-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.allergy-tag {
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 500;
}
.allergy-tag.danger { background: var(--danger-bg); color: var(--danger); }
.allergy-tag.warning { background: var(--warning-bg); color: var(--warning); }
.diet-summary { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 12px; }
.diet-summary th { background: var(--gray-bg); padding: 8px; text-align: left; font-weight: 600; }
.diet-summary td { padding: 8px; border-bottom: 1px solid #f0f0f0; }
/* Dynamic Dietary Form */
.form-row {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  flex-wrap: wrap;
}
.form-input {
  flex: 1;
  min-width: 100px;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  outline: none;
}
.form-input:focus { border-color: var(--primary); }
.btn {
  padding: 8px 16px;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .2s;
}
.btn:active { opacity: .7; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-success { background: var(--success); color: #fff; }
.btn-outline {
  background: var(--card);
  color: var(--primary);
  border: 1px solid var(--primary);
}
.btn-sm { padding: 4px 10px; font-size: 11px; }
/* Expenses */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 12px;
}
.stat-card {
  text-align: center;
  padding: 12px 8px;
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}
.stat-val { font-size: 20px; font-weight: 700; color: var(--primary); }
.stat-label { font-size: 11px; color: var(--text-sec); }
.expense-item {
  display: flex;
  align-items: center;
  padding: 10px 16px;
  border-bottom: 1px solid #f0f0f0;
  gap: 10px;
}
.expense-item.settled { opacity: .5; }
.exp-cat {
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
}
.exp-desc { flex: 1; font-size: 13px; }
.exp-amount { font-weight: 700; font-size: 14px; white-space: nowrap; }
.exp-actions { display: flex; gap: 4px; }
.day-group-header {
  padding: 8px 16px;
  background: var(--gray-bg);
  font-weight: 700;
  font-size: 13px;
  display: flex;
  justify-content: space-between;
}
/* Expense Form */
.expense-form {
  padding: 16px;
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 12px;
}
.expense-form .row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.expense-form select, .expense-form input, .expense-form textarea {
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  font-family: inherit;
  outline: none;
}
.expense-form select:focus, .expense-form input:focus { border-color: var(--primary); }
.receipt-preview { display: flex; gap: 6px; flex-wrap: wrap; margin: 8px 0; }
.receipt-preview img {
  width: 60px;
  height: 60px;
  object-fit: cover;
  border-radius: 8px;
  border: 1px solid var(--border);
}
/* My Maps Links */
.map-links {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}
.map-link {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 12px;
  background: var(--primary-light);
  color: var(--primary);
  border-radius: 10px;
  text-decoration: none;
  font-size: 13px;
  font-weight: 600;
}
.map-link:active { opacity: .7; }
/* Section Title */
.section-title {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--primary);
}
/* Badge */
.badge {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 10px;
  font-size: 10px;
  font-weight: 600;
}
.badge-danger { background: var(--danger-bg); color: var(--danger); }
.badge-warning { background: var(--warning-bg); color: var(--warning); }
/* Utility */
.mb-8 { margin-bottom: 8px; }
.mb-12 { margin-bottom: 12px; }
.mb-16 { margin-bottom: 16px; }
.text-center { text-align: center; }
.text-muted { color: var(--text-sec); font-size: 12px; }
/* Custom dietary list */
.custom-diet-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  background: var(--gray-bg);
  border-radius: 8px;
  margin-top: 6px;
  font-size: 13px;
}
/* Expense category colors */
.cat-餐飲 { background: var(--warning-bg); color: var(--warning); }
.cat-交通 { background: var(--info-bg); color: var(--info); }
.cat-住宿 { background: var(--success-bg); color: var(--success); }
.cat-活動 { background: var(--purple-bg); color: var(--purple); }
.cat-醫療 { background: var(--danger-bg); color: var(--danger); }
.cat-其他 { background: var(--gray-bg); color: var(--gray); }
/* Export button */
.export-row {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-bottom: 12px;
}
/* User Name Banner */
.user-banner {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--primary-light);
  border-radius: 8px;
  margin-bottom: 12px;
  font-size: 13px;
}
.user-banner strong { color: var(--primary); }
.user-banner button { margin-left: auto; }
/* Uploader tag */
.exp-uploader {
  font-size: 10px;
  color: var(--text-sec);
  display: block;
}
/* Receipt lightbox */
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.85);
  z-index: 200;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  gap: 10px;
}
.lightbox.show { display: flex; }
.lightbox img {
  max-width: 90vw;
  max-height: 80vh;
  border-radius: 8px;
}
.lightbox .close-lb {
  position: absolute;
  top: 16px;
  right: 16px;
  color: #fff;
  font-size: 28px;
  background: none;
  border: none;
  cursor: pointer;
}
.receipt-thumbs { display: flex; gap: 4px; margin-top: 4px; }
.receipt-thumbs img {
  width: 36px;
  height: 36px;
  object-fit: cover;
  border-radius: 4px;
  cursor: pointer;
  border: 1px solid var(--border);
}
/* Upload progress */
.upload-progress {
  height: 4px;
  background: var(--gray-bg);
  border-radius: 2px;
  margin-top: 8px;
  overflow: hidden;
  display: none;
}
.upload-progress .bar {
  height: 100%;
  background: var(--primary);
  width: 0%;
  transition: width .3s;
}
</style>
</head>

// ===== USER NAME =====
function getUserName() {
  return localStorage.getItem('userName') || '';
}
function setUserName(name) {
  localStorage.setItem('userName', name);
}
function promptUserName() {
  const name = prompt('請輸入你的名字（用於標記費用記錄與收據）');
  if (name && name.trim()) {
    setUserName(name.trim());
    renderExpenses();
  }
}

// ===== LIGHTBOX =====
function showLightbox(url, caption) {
  document.getElementById('lb-img').src = url;
  document.getElementById('lb-caption').textContent = caption || '';
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('show');
}

function openMap(lat, lng) {
  window.open(`https://www.google.com/maps/search/?api=1&query=${lat},${lng}`, '_blank');
}
function callPhone(phone) {
  window.location.href = `tel:${phone.replace(/[^0-9+]/g, '')}`;
}
function poiBtn(poiId) {
  const p = POIS[poiId];
  if (!p) return '';
  return `<button class="poi-btn" onclick="openMap(${p.lat},${p.lng})">📍 導航</button>`;
}
function phoneLink(phone) {
  if (!phone || phone === '—' || phone.includes('未填')) return phone || '';
  return `<a class="phone-btn" href="tel:${phone.replace(/[^0-9+]/g, '')}">📞 ${phone}</a>`;
}

function previewReceipts(input) {
  const preview = document.getElementById('receipt-preview');
  preview.innerHTML = '<div style="color:#999;font-size:13px">壓縮中...</div>';
  const files = [...input.files];
  pendingFiles = [];

  Promise.all(files.map(f => compressImage(f))).then(compressed => {
    pendingFiles = compressed;
    preview.innerHTML = '';
    for (const file of pendingFiles) {
      const url = URL.createObjectURL(file);
      preview.innerHTML += `<img src="${url}">`;
    }
  });
}

// 圖片壓縮：最大邊 1200px、JPEG 品質 0.7（收據清晰可辨）
function compressImage(file, maxDim = 1200, quality = 0.7) {
  return new Promise((resolve) => {
    if (!file.type.startsWith('image/')) { resolve(file); return; }
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w <= maxDim && h <= maxDim && file.size < 300 * 1024) {
          resolve(file); return; // 已經夠小，不壓縮
        }
        if (w > h) { if (w > maxDim) { h = Math.round(h * maxDim / w); w = maxDim; } }
        else       { if (h > maxDim) { w = Math.round(w * maxDim / h); h = maxDim; } }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        canvas.toBlob((blob) => {
          const compressed = new File([blob], file.name.replace(/\.\w+$/, '.jpg'), { type: 'image/jpeg' });
          console.log(`📷 壓縮：${(file.size/1024).toFixed(0)}KB → ${(compressed.size/1024).toFixed(0)}KB`);
          resolve(compressed);
        }, 'image/jpeg', quality);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function uploadReceipts(docId) {
  const urls = [];
  const progEl = document.getElementById('upload-progress');
  const barEl = document.getElementById('upload-bar');
  if (pendingFiles.length === 0) return urls;
  progEl.style.display = 'block';
  for (let i = 0; i < pendingFiles.length; i++) {
    const file = pendingFiles[i];
    const ext = file.name.split('.').pop() || 'jpg';
    const ref = stg.ref(`receipts/${docId}/${Date.now()}_${i}.${ext}`);
    await ref.put(file);
    const url = await ref.getDownloadURL();
    urls.push(url);
    barEl.style.width = `${Math.round(((i+1)/pendingFiles.length)*100)}%`;
  }
  progEl.style.display = 'none';
  barEl.style.width = '0%';
  return urls;
}

async function addExpense() {
  const userName = getUserName();
  if (!userName) { promptUserName(); return; }
  const day = document.getElementById('exp-day').value;
  const category = document.getElementById('exp-cat').value;
  const description = document.getElementById('exp-desc').value.trim();
  const amount = parseInt(document.getElementById('exp-amount').value);
  if (!description || !amount) { alert('請填寫說明和金額'); return; }

  const btn = document.getElementById('btn-add-expense');
  btn.disabled = true;
  btn.textContent = '上傳中...';

  try {
    const docRef = await db.collection('expenses').add({
      day, category, description, amount,
      receipt_urls: [],
      settled: false,
      uploader: userName,
      created_at: firebase.firestore.FieldValue.serverTimestamp(),
    });

    if (pendingFiles.length > 0) {
      const urls = await uploadReceipts(docRef.id);
      await docRef.update({ receipt_urls: urls });
    }

    pendingFiles = [];
    document.getElementById('exp-desc').value = '';
    document.getElementById('exp-amount').value = '';
    const preview = document.getElementById('receipt-preview');
    if (preview) preview.innerHTML = '';
  } catch (err) {
    alert('上傳失敗：' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '＋ 新增費用';
  }
}

async function toggleSettle(docId) {
  const item = allExpenses.find(e => e._id === docId);
  if (item) {
    await db.collection('expenses').doc(docId).update({ settled: !item.settled });
  }
}

async function deleteExpense(docId) {
  if (!confirm('確定要刪除此筆費用？')) return;
  const item = allExpenses.find(e => e._id === docId);
  // Delete receipt files from storage
  if (item && item.receipt_urls) {
    for (const url of item.receipt_urls) {
      try { await stg.refFromURL(url).delete(); } catch(e) {}
    }
  }
  await db.collection('expenses').doc(docId).delete();
}

function exportExpenses() {
  const expenses = allExpenses;
  if (expenses.length === 0) { alert('無費用記錄可匯出'); return; }
  const total = expenses.reduce((s, e) => s + (e.amount||0), 0);
  let txt = '花東單車計畫 — 費用結算摘要\n';
  txt += `匯出日期：${new Date().toLocaleDateString('zh-TW')}\n`;
  txt += '='.repeat(40) + '\n\n';
  const dayOrder = ['4/12','4/13','4/14','4/15','4/16','4/17'];
  for (const day of dayOrder) {
    const items = expenses.filter(e => e.day === day);
    if (!items.length) continue;
    const sub = items.reduce((s, e) => s + (e.amount||0), 0);
    txt += `【${day}】小計 $${sub.toLocaleString()}\n`;
    items.forEach((e, idx) => {
      txt += `  ${e.settled ? '✅' : '⬜'} ${e.category} — ${e.description}：$${(e.amount||0).toLocaleString()} (${e.uploader||'—'})`;
      if (e.receipt_urls && e.receipt_urls.length) txt += ` 📷${e.receipt_urls.length}張`;
      txt += '\n';
      // 附上收據連結
      if (e.receipt_urls && e.receipt_urls.length) {
        e.receipt_urls.forEach((url, i) => {
          txt += `    收據${i+1}: ${url}\n`;
        });
      }
    });
    txt += '\n';
  }
  txt += '='.repeat(40) + '\n';
  txt += `總計：$${total.toLocaleString()}\n`;
  txt += `已結算：$${expenses.filter(e => e.settled).reduce((s,e) => s + (e.amount||0), 0).toLocaleString()}\n`;
  txt += `待結算：$${expenses.filter(e => !e.settled).reduce((s,e) => s + (e.amount||0), 0).toLocaleString()}\n`;

  // 同時產生 CSV（方便 Excel 開啟）
  let csv = '\uFEFF日期,類別,說明,金額,記錄人,已結算,收據連結\n';
  expenses.forEach(e => {
    const urls = (e.receipt_urls || []).join(' ; ');
    csv += `"${e.day}","${e.category}","${e.description}",${e.amount||0},"${e.uploader||''}","${e.settled?'是':'否'}","${urls}"\n`;
  });

  // 下載 TXT
  const blob1 = new Blob([txt], { type: 'text/plain;charset=utf-8' });
  const a1 = document.createElement('a');
  a1.href = URL.createObjectURL(blob1);
  a1.download = '花東單車費用結算.txt';
  a1.click();

  // 下載 CSV
  setTimeout(() => {
    const blob2 = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const a2 = document.createElement('a');
    a2.href = URL.createObjectURL(blob2);
    a2.download = '花東單車費用結算.csv';
    a2.click();
  }, 500);
}

// ===== TAB NAVIGATION =====

function switchTab(tabId) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tabId));
  document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === tabId));
  window.location.hash = tabId;
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

// Hash routing
function handleHash() {
  const hash = window.location.hash.replace('#', '') || 'itinerary';
  switchTab(hash);
}
window.addEventListener('hashchange', handleHash);
